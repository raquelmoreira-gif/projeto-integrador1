<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários - Bia Criativa</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">Bia Criativa</div>
      <p class="sidebar-user">Operador: <span id="usuarioLogado">—</span></p>
      <nav class="menu">
        <a href="../index.html">Dashboard</a>
        <a href="caixa.html">Caixa</a>
        <a href="vendas.html">Vendas</a>
        <a href="produtos.html">Produtos</a>
        <a href="estoque.html">Estoque</a>
        <a href="relatorios.html">Relatórios</a>
        <a href="#" class="active">Usuários</a>
        <a href="login.html">Entrar</a>
      </nav>
    </aside>

    <div class="content-area">
      <header class="header">
        <h1>Usuários</h1>
      </header>

      <main class="main-content">
        <section class="panel">
          <h2>Novo usuário</h2>
          <p class="text-muted">Alinhado à tabela <code>usuarios</code> do README do database: nome, e-mail único, senha e tipo <code>admin</code> ou <code>suporte</code>.</p>
          <form id="formNovoUsuario">
            <input type="text" id="nuNome" placeholder="Nome" required autocomplete="name">
            <input type="email" id="nuEmail" placeholder="E-mail" required autocomplete="email">
            <input type="password" id="nuSenha" placeholder="Senha" required autocomplete="new-password">
            <select id="nuTipo" required>
              <option value="">Tipo</option>
              <option value="admin">admin</option>
              <option value="suporte">suporte</option>
            </select>
            <button type="submit">Cadastrar</button>
          </form>
          <p id="mensagemUsuario"></p>
        </section>
      </main>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
