      </nav>
    </aside>

    <div class="content-area">
      <header class="header">
        <h1>Usuários</h1>
      </header>

      <main class="main-content">
        <section class="panel" style="max-width:560px">
          <h2>Novo usuário</h2>
          <p class="text-muted">Cadastre novos operadores com nome, e-mail único, senha e tipo (<code>admin</code> ou <code>suporte</code>).</p>
          <form id="formNovoUsuario">
            <div class="panel-row">
              <div class="form-group">
                <label>Nome</label>
                <input type="text" id="nuNome" placeholder="Nome completo" required autocomplete="name">
              </div>
              <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="nuEmail" placeholder="email@exemplo.com" required autocomplete="email">
              </div>
            </div>
            <div class="panel-row">
              <div class="form-group">
                <label>Senha</label>
                <input type="password" id="nuSenha" placeholder="Senha segura" required autocomplete="new-password">
              </div>
              <div class="form-group">
                <label>Tipo</label>
                <select id="nuTipo" required>
                  <option value="">Selecione o tipo</option>
                  <option value="admin">admin</option>
                  <option value="suporte">suporte</option>
                </select>
              </div>
            </div>
            <button type="submit">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
              Cadastrar usuário
            </button>
          </form>
          <p id="mensagemUsuario"></p>
        </section>
      </main>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
