<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <title>Entrar - Bia Criativa</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">Bia Criativa</div>
      <nav class="menu">

    <div class="content-area">
      <header class="header">
        <h1>Identificação do operador</h1>
      </header>

      <main class="main-content">
        <section class="panel panel-login">
          <p>Selecione o usuário cadastrado no sistema (tabela <code>usuarios</code>). Necessário para registrar vendas (<code>usuario_id</code>). Cadastre novos usuários em <a href="usuarios.html">Usuários</a>.</p>
          <select id="selectUsuarioLogin">
            <option value="">Carregando usuários…</option>
          </select>
          <button type="button" id="btnEntrarLogin">Entrar</button>
          <button type="button" id="btnSairLogin" class="btn-ghost">Sair / trocar operador</button>
          <p id="mensagemLogin"></p>
        </section>
      </main>
    </div>
  </div>

  <script src="../js/config.js"></script>
