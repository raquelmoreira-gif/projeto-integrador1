<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bia Criativa</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">Bia Criativa</div>
      <p class="sidebar-user">Operador: <span id="usuarioLogado">—</span></p>

      <nav class="menu">
        <a href="#" class="active">Dashboard</a>
        <a href="pages/caixa.html">Caixa</a>
        <a href="pages/vendas.html">Vendas</a>
        <a href="pages/produtos.html">Produtos</a>
        <a href="pages/estoque.html">Estoque</a>
        <a href="pages/relatorios.html">Relatórios</a>
        <a href="pages/usuarios.html">Usuários</a>
        <a href="pages/login.html">Entrar</a>
      </nav>
    </aside>

    <div class="content-area">
      <header class="header">
        <h1>Painel de Controle</h1>
      </header>

      <main class="main-content">
        <section class="cards">
          <div class="card">
            <p class="card-title">Caixa Atual</p>
            <h2 id="dashCaixaStatus">—</h2>
            <span class="card-info" id="dashCaixaInfo">Carregando…</span>
          </div>

          <div class="card">
            <p class="card-title">Total Vendido (caixa)</p>
            <h2 id="dashTotalVendido">—</h2>
            <span class="card-info" id="dashVendasInfo">—</span>
          </div>

          <div class="card">
            <p class="card-title">Vendas (caixa)</p>
            <h2 id="dashQtdVendas">—</h2>
            <span class="card-info">No caixa aberto</span>
          </div>
        </section>

        <section class="panel">
          <h2>Abertura de Caixa</h2>
          <input type="date" id="dataCaixa">
          <input type="number" id="valorInicial" placeholder="Valor inicial" min="0" step="0.01">
          <button type="button" id="btnAbrirCaixa">Abrir Caixa</button>
          <p id="mensagem"></p>
        </section>

        <section class="panel">
          <h2>Produtos (prévia)</h2>
          <button type="button" id="btnCarregarProdutos">Carregar Produtos</button>
          <div id="listaProdutos"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
