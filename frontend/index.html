<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bia Criativa</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">Bia Criativa</div>

      <nav class="menu">
        <a href="#" class="active">Dashboard</a>
        <a href="pages/caixa.html">Caixa</a>
        <a href="pages/vendas.html">Vendas</a>
        <a href="pages/produtos.html">Produtos</a>
        <a href="pages/relatorios.html">Relatórios</a>
      </nav>
    </aside>

    <div class="content-area">
      <header class="header">
        <h1>Painel de Controle</h1>
      </header>

      <main class="main-content">

        <!-- CARDS -->
        <section class="cards">
          <div class="card">
            <p class="card-title">Caixa Atual</p>
            <h2>Aberto</h2>
            <span class="card-info">Atualizado hoje</span>
          </div>

          <div class="card">
            <p class="card-title">Total Vendido</p>
            <h2>R$ 1.250,00</h2>
            <span class="card-info">+8,5% desde ontem</span>
          </div>

          <div class="card">
            <p class="card-title">Vendas</p>
            <h2>12</h2>
            <span class="card-info">+3 hoje</span>
          </div>

          <div class="card">
            <p class="card-title">Ticket Médio</p>
            <h2>R$ 104,17</h2>
            <span class="card-info">Resumo do dia</span>
          </div>
        </section>

        <!-- CAIXA -->
        <section class="panel">
          <h2>Abertura de Caixa</h2>
          <input type="date" id="dataCaixa">
          <input type="number" id="valorInicial" placeholder="Valor inicial">
          <button id="btnAbrirCaixa">Abrir Caixa</button>
          <p id="mensagem"></p>
        </section>

        <!-- PRODUTOS -->
        <section class="panel">
          <h2>Produtos</h2>
          <button id="btnCarregarProdutos">Carregar Produtos</button>
          <div id="listaProdutos"></div>
        </section>

      </main>
    </div>
  </div>

  <script src="./js/api.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
